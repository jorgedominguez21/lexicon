<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexicon Studio - Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="menu-toggle" class="menu-toggle">☰</button>

    <nav id="sidebar" class="sidebar">
        <div class="logo">
            <h2>📚 Lexicon Studio</h2>
        </div>
        <ul>
            <li><button id="btn-dashboard" class="nav-btn active">Inicio</button></li>
            <li><button id="btn-gestion" class="nav-btn">Gestión de Palabras</button></li>
            <li><button id="btn-juego" class="nav-btn">🎮 Jugar Ahorcado</button></li>
        </ul>
    </nav>

    <main id="main-content">
        
        <section id="dashboard" class="section active">
            <div class="welcome">
                <h1>Bienvenido a Lexicon</h1>
                    <p class="subtitle">Colección de palabras en castellano para aprendizaje personal y a quien pueda interesar.</p>
        
            <div class="stats-container">
                <p id="stats-total">Total palabras: Cargando...</p>
            </div>

            <div class="signature">
                <p>by Jorge Dominguez</p>
            </div>
    </div>
</section>

        <section id="gestion" class="section">
            <div class="header">
                <input type="text" id="busqueda" placeholder="🔍 Buscar palabra en tu diccionario...">
            </div>
            
            <div id="lista-palabras" class="lista-container">
                </div>
            
            <div id="modal-edit" class="modal">
                <div class="modal-content">
                    <h3 id="modal-title">Detalle de Palabra</h3>
                    
                    <div class="input-group">
                        <label>Palabra:</label>
                        <input type="text" id="input-word" disabled>
                    </div>

                    <div class="input-group">
                        <label>Categoría Gramatical:</label>
                        <select id="input-cat" disabled>
                            <option value="sust">Sustantivo</option>
                            <option value="adj">Adjetivo</option>
                            <option value="verb">Verbo</option>
                            <option value="adv">Adverbio</option>
                            <option value="expr">Expresión</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Definición y Notas:</label>
                        <textarea id="input-def" disabled></textarea>
                    </div>

                    <div class="modal-buttons">
                        <button id="btn-save" style="display:none;">Guardar Cambios</button>
                        <button id="btn-cancel">Cerrar</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="juego" class="section">
            <div class="game-header">
                <h2 id="game-title">¡Juega al Ahorcado!</h2>
                <div class="hint-box">
                    <p id="game-hint">Pista: Cargando...</p>
                </div>
            </div>

            <div class="game-container">
                <canvas id="canvas-ahorcado" width="300" height="300"></canvas>
                <div id="palabra-mostrada" class="word-display"></div>
                <div id="intentos-restantes" class="tries-left">Intentos: 6</div>
                <div id="teclado" class="teclado"></div>
            </div>
            
            <div id="game-overlay" class="game-overlay">
                <h2 id="overlay-msg">¡MENSAJE!</h2>
                <p id="palabra-final"></p>
                <button class="btn-primary" onclick="initJuego()">Nueva Partida</button>
            </div>
        </section>
    </main>

    <script src="config-public.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
